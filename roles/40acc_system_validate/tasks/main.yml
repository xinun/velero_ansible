---
# tasks file for acc_system_validate
- name: Verify acc-system namespace is Active
  shell: kubectl get ns {{ target_namespace }} | grep 'Active'
  changed_when: false

- name: Verify all PVCs are Bound
  shell: kubectl get pvc -n {{ target_namespace }} | egrep -v 'Bound|NAME'
  register: unbound_pvcs
  failed_when: unbound_pvcs.rc == 0
  changed_when: false

- name: Verify main Pods are Running (no Pending/Error/CrashLoop)
  shell: kubectl get po -n {{ target_namespace }} | egrep 'Pending|Init|CreateContainerConfigError|CrashLoopBackOff|Error|ImagePullBackOff|0/'
  register: bad_pods
  failed_when: bad_pods.rc == 0
  changed_when: false

- name: Verify APIServices are True
  shell: kubectl get apiservice {{ item }} | tail -n +2 | grep -v 'True'
  loop: "{{ acc_system_apiservices }}"
  register: apiservice_status
  failed_when: apiservice_status.rc == 0
  changed_when: false

- name: Verify authmanagement API is reachable
  shell: kubectl api-resources | grep -i authmanagement
  changed_when: false

- name: Verify user tokens can be fetched
  shell: kubectl get tokens.authmanagement.accordions.co.kr -A
  changed_when: false

- name: Verify member-agent is Running
  shell: kubectl get po -n {{ target_namespace }} | grep member-agent | grep Running
  changed_when: false

- name: Check member-agent logs for issues
  shell: kubectl logs -n {{ target_namespace }} deploy/member-agent --tail=100 | egrep -i 'error|fail|exception'
  register: member_agent_logs
  failed_when: false
  changed_when: false

- name: Show any errors in member-agent logs
  debug:
    var: member_agent_logs.stdout_lines
  when: member_agent_logs.rc == 0
