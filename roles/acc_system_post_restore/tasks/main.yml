---
# tasks file for acc_system_post_restore
- name: Read backup names file for webhook restore
  slurp:
    src: "{{ backup_names_file }}"
  register: backup_names_content

- name: Parse Webhook backup name
  set_fact:
    webhook_backup_name: "{{ (backup_names_content.content | b64decode | regex_search('WEBHOOK_BK=(.*)', '\\1'))[0] }}"

- name: Recreate problem pods
  shell: kubectl get pod -n {{ target_namespace }} | awk '/{{ item }}/ {print $1}' | xargs -r kubectl delete pod -n {{ target_namespace }}
  loop: "{{ post_restore_recreate_pods_patterns }}"
  register: recreate_pods
  changed_when: false

- name: Restart member-agent deployment
  shell: kubectl rollout restart deployment/{{ item }} -n {{ target_namespace }}
  loop: "{{ post_restore_restart_deployments }}"

- name: Wait for member-agent rollout
  shell: kubectl rollout status deployment/{{ item }} -n {{ target_namespace }} --timeout=120s
  loop: "{{ post_restore_restart_deployments }}"

- name: Restore 3 - Webhook
  command: >
    velero restore create {{ webhook_backup_name }}-restore-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}
    --from-backup {{ webhook_backup_name }}
    --wait
  register: webhook_restore_result

- name: Show Webhook restore result
  debug:
    var: webhook_restore_result.stdout_lines
