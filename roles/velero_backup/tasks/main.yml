---
# tasks file for velero_backup
- name: Set timestamp
  set_fact:
    backup_ts: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

- name: Set backup names
  set_fact:
    full_backup_name: "{{ backup_prefix }}-namespace-{{ backup_ts }}"
    apiservice_backup_name: "{{ backup_prefix }}-apiservice-{{ backup_ts }}"
    webhook_backup_name: "{{ backup_prefix }}-webhook-{{ backup_ts }}"

- name: Save backup names to file
  copy:
    dest: "{{ backup_names_file }}"
    content: |
      FULL_BK={{ full_backup_name }}
      API_BK={{ apiservice_backup_name }}
      WEBHOOK_BK={{ webhook_backup_name }}
    mode: '0644'

- name: Backup 1 - {{ target_namespace }} namespace
  command: >
    velero backup create {{ full_backup_name }}
    --include-namespaces {{ target_namespace }}
    --default-volumes-to-fs-backup
    --snapshot-volumes=false
    --wait
  register: ns_backup_result

- name: Verify namespace backup is Completed or PartiallyFailed
  shell: velero backup get {{ full_backup_name }} | egrep 'Completed|PartiallyFailed'
  changed_when: false

- name: Backup 2 - APIService
  command: >
    velero backup create {{ apiservice_backup_name }}
    --include-cluster-resources=true
    --include-resources {{ apiservice_backup_resource }}
    --wait
  register: api_backup_result

- name: Verify APIService backup is Completed
  shell: velero backup get {{ apiservice_backup_name }} | grep 'Completed'
  changed_when: false

- name: Backup 3 - Webhook
  command: >
    velero backup create {{ webhook_backup_name }}
    --include-cluster-resources=true
    --include-resources {{ webhook_backup_resources | join(',') }}
    --wait
  register: webhook_backup_result

- name: Verify Webhook backup is Completed
  shell: velero backup get {{ webhook_backup_name }} | grep 'Completed'
  changed_when: false
