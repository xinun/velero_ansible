---
# 2_velero_backup

# (date로 저장하기 때문에 백업시에 백업 이름을 env파일 기록)
- name: 백업 1 - acc-system 네임스페이스 및 PVC 백업
  shell: |
    BACKUP_NAME="acc-system-namespace-$(date +%Y%m%d-%H%M%S)"
    velero backup create "$BACKUP_NAME" \
      --include-namespaces acc-system \
      --default-volumes-to-fs-backup \
      --snapshot-volumes=false \
      --wait
    echo "FULL_BK=$BACKUP_NAME" > /root/acc-system-velero-backup-names.env
  async: 3600
  poll: 15

- name: acc-system 관련 APIService에 임시 라벨 추가
  shell: |
    for name in $(kubectl get apiservice -o json | jq -r '.items[] | select(.spec.service.namespace=="acc-system") | .metadata.name'); do
      kubectl label apiservice "$name" velero-backup=acc-system --overwrite
    done

- name: 백업 2 - APIService 백업 (라벨 지정)
  shell: |
    BACKUP_NAME="acc-system-apiservice-$(date +%Y%m%d-%H%M%S)"
    velero backup create "$BACKUP_NAME" \
      --include-cluster-resources=true \
      --include-resources apiservices.apiregistration.k8s.io \
      --selector velero-backup=acc-system \
      --wait
    echo "API_BK=$BACKUP_NAME" >> /root/acc-system-velero-backup-names.env

- name: APIService 임시 라벨 제거
  shell: kubectl label apiservice -l velero-backup=acc-system velero-backup-
  failed_when: false

- name: acc-system 관련 Webhook에 임시 라벨 추가
  shell: |
    for name in $(kubectl get mutatingwebhookconfigurations -o json | jq -r '.items[] | select(.webhooks[].clientConfig.service.namespace=="acc-system") | .metadata.name' | sort -u); do
      kubectl label mutatingwebhookconfiguration "$name" velero-backup=acc-system --overwrite
    done
    for name in $(kubectl get validatingwebhookconfigurations -o json | jq -r '.items[] | select(.webhooks[].clientConfig.service.namespace=="acc-system") | .metadata.name' | sort -u); do
      kubectl label validatingwebhookconfiguration "$name" velero-backup=acc-system --overwrite
    done

- name: 백업 3 - Webhook 백업 (라벨 지정)
  shell: |
    BACKUP_NAME="acc-system-webhook-$(date +%Y%m%d-%H%M%S)"
    velero backup create "$BACKUP_NAME" \
      --include-cluster-resources=true \
      --include-resources mutatingwebhookconfigurations.admissionregistration.k8s.io,validatingwebhookconfigurations.admissionregistration.k8s.io \
      --selector velero-backup=acc-system \
      --wait
    echo "WEBHOOK_BK=$BACKUP_NAME" >> /root/acc-system-velero-backup-names.env

- name: Webhook 임시 라벨 제거
  shell: |
    kubectl label mutatingwebhookconfiguration -l velero-backup=acc-system velero-backup-
    kubectl label validatingwebhookconfiguration -l velero-backup=acc-system velero-backup-
  failed_when: false


